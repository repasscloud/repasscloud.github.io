# Sample workflow for building and deploying a Hugo site to GitHub Pages
name: Deploy Hugo site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.156.0
      # Domain replacement
      SEARCH_DOMAIN: "example.org"
      REPLACE_DOMAIN: "repasscloud.com"
    steps:
      - name: Install Hugo CLI
        run: |
          wget -O ${{ runner.temp }}/hugo.deb https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb \
          && sudo dpkg -i ${{ runner.temp }}/hugo.deb

      - name: Install Dart Sass
        run: sudo snap install dart-sass

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Install Node.js dependencies
        run: "[[ -f package-lock.json || -f npm-shrinkwrap.json ]] && npm ci || true"

      - name: Clean output directories
        run: |
          for dir in public docs; do
            if [ -d "$dir" ]; then
              rm -rf "$dir"
              echo "Removed directory: $dir"
            fi
          done

      - name: Build with Hugo
        env:
          HUGO_CACHEDIR: ${{ runner.temp }}/hugo_cache
          HUGO_ENVIRONMENT: production
        run: |
          hugo \
            --minify \
            --baseURL "${{ steps.pages.outputs.base_url }}/"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  tweet:
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check for new post
        id: detect
        run: |
          NEW_POST=$(git diff --name-only --diff-filter=A HEAD~1 HEAD -- 'content/posts/*.md' | head -n 1)
          echo "post=$NEW_POST" >> $GITHUB_OUTPUT

      - name: Build post URL and title
        if: steps.detect.outputs.post != ''
        id: details
        run: |
          POST="${{ steps.detect.outputs.post }}"
          SLUG=$(basename "$POST" .md)
          URL="https://repasscloud.com/posts/${SLUG}/"
          TITLE=$(grep '^title' "$POST" | head -n 1 | sed "s/title = '//;s/'//")
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "title=$TITLE" >> $GITHUB_OUTPUT

      - name: Post to Twitter
        if: steps.detect.outputs.post != ''
        env:
          CONSUMER_KEY: ${{ secrets.TWITTER_CONSUMER_KEY }}
          CONSUMER_SECRET: ${{ secrets.TWITTER_CONSUMER_SECRET }}
          ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
        run: |
          pip install requests requests-oauthlib --quiet
          python3 - <<'EOF'
          import os
          from requests_oauthlib import OAuth1Session

          tweet_text = f"New post: ${{ steps.details.outputs.title }} ${{ steps.details.outputs.url }}"

          twitter = OAuth1Session(
              os.environ["CONSUMER_KEY"],
              client_secret=os.environ["CONSUMER_SECRET"],
              resource_owner_key=os.environ["ACCESS_TOKEN"],
              resource_owner_secret=os.environ["ACCESS_TOKEN_SECRET"],
          )

          response = twitter.post(
              "https://api.twitter.com/2/tweets",
              json={"text": tweet_text},
          )

          if response.status_code != 201:
              print(response.text)
              exit(1)
          EOF