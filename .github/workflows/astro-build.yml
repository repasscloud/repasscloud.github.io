name: Dev → Main Pipeline

on:
  push:
    branches: ["dev"]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: "dev-to-main"
  cancel-in-progress: false

env:
  BUILD_PATH: "."

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Detect package manager
        id: detect-package-manager
        run: |
          if [ -f "${{ github.workspace }}/yarn.lock" ]; then
            echo "manager=yarn" >> $GITHUB_OUTPUT
            echo "command=install" >> $GITHUB_OUTPUT
            echo "runner=yarn" >> $GITHUB_OUTPUT
            echo "lockfile=yarn.lock" >> $GITHUB_OUTPUT
            exit 0
          elif [ -f "${{ github.workspace }}/package.json" ]; then
            echo "manager=npm" >> $GITHUB_OUTPUT
            echo "command=ci" >> $GITHUB_OUTPUT
            echo "runner=npx --no-install" >> $GITHUB_OUTPUT
            echo "lockfile=package-lock.json" >> $GITHUB_OUTPUT
            exit 0
          else
            echo "Unable to determine package manager"
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: "25"
          cache: ${{ steps.detect-package-manager.outputs.manager }}
          cache-dependency-path: ${{ env.BUILD_PATH }}/${{ steps.detect-package-manager.outputs.lockfile }}

      - name: Install dependencies
        run: ${{ steps.detect-package-manager.outputs.manager }} ${{ steps.detect-package-manager.outputs.command }}
        working-directory: ${{ env.BUILD_PATH }}

      - name: Audit dependencies
        id: audit
        working-directory: ${{ env.BUILD_PATH }}
        run: |
          if npm audit; then
            echo "clean=true" >> $GITHUB_OUTPUT
          else
            echo "clean=false" >> $GITHUB_OUTPUT
          fi

      - name: Install Tectonic
        uses: wtfjoke/setup-tectonic@v4

      - name: Check version
        run: tectonic --version

      - name: Publish PDF files
        run: |
          find ./latex -name "*.tex" | while IFS= read -r tex_file; do
            output_dir="static/${tex_file#./latex/}"
            output_dir="$(dirname "$output_dir")"
            mkdir -p "$output_dir"
            tectonic "$tex_file" -o "$output_dir"
          done

      - name: Build with Astro
        run: ${{ steps.detect-package-manager.outputs.runner }} astro build
        working-directory: ${{ env.BUILD_PATH }}

      - name: Fix and push audit issues
        if: steps.audit.outputs.clean == 'false'
        working-directory: ${{ env.BUILD_PATH }}
        run: |
          npm audit fix
          if git diff --quiet; then
            echo "::error::Audit failed and no automatic fixes are available. Manual intervention required."
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package-lock.json
          git commit -m "chore: npm audit fix"
          find . -type f -name '*.pdf' -print0 | xargs -0 git add
          git commit -m "chore: update PDFs after audit fix" || echo "No PDF changes to commit"
          git push
          echo "::notice::Audit fixes committed and pushed to dev. A new workflow run will build and raise the PR."
          exit 1

  merge:
    name: Create and Merge PR
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/dev'
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Create and merge PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --base main \
            --head dev \
            --title "Auto merge" \
            --body "Auto merge OK" \
          || true

          gh pr merge dev --merge